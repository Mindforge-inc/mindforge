---
layout: null
title: PDF 페이지 편집기
permalink: /pdf-editor/
---

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 580px;
    font-family: var(--font-sans);
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
    flex-wrap: wrap;
  }

  .toolbar-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-right: 4px;
  }

  .toolbar-sep {
    width: 0.5px;
    height: 20px;
    background: var(--color-border-tertiary);
    margin: 0 2px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 11px;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    color: var(--color-text-primary);
    transition: background 0.12s;
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--color-background-secondary);
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn.danger {
    color: var(--color-text-danger);
    border-color: var(--color-border-danger);
  }

  .btn.danger:hover {
    background: var(--color-background-danger);
  }

  .btn.primary {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: transparent;
  }

  .btn.primary:hover {
    opacity: 0.82;
  }

  .btn:disabled {
    opacity: 0.32;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn.pw-active {
    color: #D97706;
    border-color: #D97706;
    background: #FEF3C7;
  }

  .btn.pw-active:hover {
    background: #FDE68A;
  }

  .upload-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 52px 24px;
    gap: 10px;
    border: 1.5px dashed var(--color-border-secondary);
    border-top: none;
    border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg);
    background: var(--color-background-secondary);
    cursor: pointer;
    color: var(--color-text-secondary);
    transition: background 0.12s;
  }

  .upload-zone:hover,
  .upload-zone.drag-over {
    background: var(--color-background-tertiary);
  }

  .upload-zone i {
    font-size: 38px;
    opacity: 0.35;
  }

  .upload-zone p {
    font-size: 14px;
  }

  .upload-zone small {
    font-size: 12px;
    opacity: 0.55;
  }

  .workspace {
    border: 0.5px solid var(--color-border-tertiary);
    border-top: none;
    border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg);
    overflow: hidden;
    display: none;
    position: relative;
  }

  .ws-drop-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: var(--color-background-info);
    border: 2px dashed #378ADD;
    border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--color-text-info);
    pointer-events: none;
  }

  .ws-drop-overlay i {
    font-size: 36px;
  }

  .ws-drop-overlay p {
    font-size: 14px;
    font-weight: 500;
  }

  .ws-drop-overlay.active {
    display: flex;
  }

  .doc-section {
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  .doc-section:last-child {
    border-bottom: none;
  }

  .doc-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    background: var(--color-background-secondary);
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  .doc-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .doc-info {
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .pages-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    padding: 14px 10px;
    background: var(--color-background-primary);
    min-height: 150px;
    align-items: flex-start;
  }

  .page-slot {
    display: flex;
    align-items: center;
    position: relative;
  }

  .drop-indicator {
    width: 3px;
    height: 128px;
    border-radius: 2px;
    background: transparent;
    margin: 0 3px;
    flex-shrink: 0;
    transition: background 0.1s;
    pointer-events: none;
  }

  .drop-indicator.active {
    background: #378ADD;
  }

  .page-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: grab;
    user-select: none;
    padding: 4px;
    border-radius: var(--border-radius-md);
    transition: opacity 0.15s;
  }

  .page-card.is-dragging {
    opacity: 0.25;
  }

  .page-card:active {
    cursor: grabbing;
  }

  .page-thumb {
    width: 88px;
    height: 118px;
    border-radius: 4px;
    border: 0.5px solid var(--color-border-secondary);
    background: #fff;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page-card.selected .page-thumb {
    border: 2px solid #378ADD;
  }

  .page-card:hover .page-thumb {
    border-color: var(--color-border-primary);
  }

  .page-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .page-check {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: transparent;
    transition: all 0.12s;
  }

  .page-card.selected .page-check {
    background: #378ADD;
    border-color: #378ADD;
    color: white;
  }

  .page-del-btn {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 19px;
    height: 19px;
    border-radius: 50%;
    background: #E24B4A;
    color: white;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    cursor: pointer;
    z-index: 2;
    border: none;
  }

  .page-card:hover .page-del-btn {
    display: flex;
  }

  .page-label {
    font-size: 11px;
    color: var(--color-text-secondary);
  }

  .status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    background: var(--color-background-secondary);
    border-top: 0.5px solid var(--color-border-tertiary);
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .sel-badge {
    background: var(--color-background-info);
    color: var(--color-text-info);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }

  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(50px);
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    padding: 7px 16px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    transition: transform 0.22s;
    z-index: 9999;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .ghost-card {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    opacity: 0.85;
    transform: rotate(2deg) scale(1.05);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .ghost-thumb {
    width: 72px;
    height: 96px;
    border-radius: 4px;
    border: 2px solid #378ADD;
    background: #fff;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
  }

  .ghost-thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  canvas {
    display: none;
  }

  input[type=file] {
    display: none;
  }


  /* 암호 설정 모달 */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open {
    display: flex;
  }

  .modal {
    background: var(--color-background-primary, #ffffff);
    /* CSS 변수가 없는 환경(다크모드 등)에서도 불투명 배경 보장 */
    isolation: isolate;
    border: 0.5px solid var(--color-border-secondary, #e0e0e0);
    border-radius: var(--border-radius-lg, 10px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.32);
    width: 420px;
    max-width: calc(100vw - 32px);
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text-primary);
  }

  .modal-header i {
    color: #D97706;
    font-size: 16px;
  }

  .modal-close {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--color-text-secondary);
    font-size: 16px;
    display: flex;
    padding: 2px;
    border-radius: 4px;
  }

  .modal-close:hover {
    color: var(--color-text-primary);
  }

  .modal-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: inherit;
  }

  .modal-footer {
    padding: 12px 16px;
    border-top: 0.5px solid var(--color-border-tertiary);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .pw-fields {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .pw-field {
    position: relative;
  }

  .pw-field input {
    width: 100%;
    padding: 7px 34px 7px 10px;
    font-size: 13px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    outline: none;
  }

  .pw-field input:focus {
    border-color: #378ADD;
  }

  .pw-eye {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--color-text-secondary);
    font-size: 14px;
    display: flex;
    padding: 2px;
  }

  .pw-eye:hover {
    color: var(--color-text-primary);
  }

  .pw-mismatch {
    font-size: 11px;
    color: #E24B4A;
    display: none;
  }

  .pw-hint {
    font-size: 11px;
    color: var(--color-text-secondary);
  }
</style>

<h2 class="sr-only">PDF 페이지 편집기 — PDF를 업로드하고 마우스로 페이지를 드래그해 순서를 바꾸세요.</h2>

<div class="app">
  <div class="toolbar">
    <div class="toolbar-title">
      <i class="ti ti-file-type-pdf" aria-hidden="true" style="font-size:17px;color:#E24B4A;"></i>
      PDF 에디터
    </div>
    <div class="toolbar-sep"></div>
    <button class="btn" onclick="triggerUpload()"><i class="ti ti-plus" aria-hidden="true"></i> PDF 추가</button>
    <button class="btn danger" id="btn-del" disabled onclick="deleteSelected()"><i class="ti ti-trash"
        aria-hidden="true"></i> 선택 삭제</button>
    <button class="btn" id="btn-rot" disabled onclick="rotateSelected()"><i class="ti ti-rotate-clockwise"
        aria-hidden="true"></i> 회전</button>
    <div class="toolbar-sep"></div>
    <button class="btn" id="btn-all" disabled onclick="selectAll()"><i class="ti ti-select-all" aria-hidden="true"></i>
      전체 선택</button>
    <button class="btn" onclick="clearSel()"><i class="ti ti-deselect" aria-hidden="true"></i> 해제</button>
    <div class="toolbar-sep"></div>
    <button class="btn" id="btn-pw" onclick="openPasswordModal()"><i class="ti ti-lock" aria-hidden="true"></i> 암호
      설정</button>
    <button class="btn primary" id="btn-export" disabled onclick="exportPDF()"><i class="ti ti-download"
        aria-hidden="true"></i> 내보내기</button>
  </div>

  <div id="upload-zone" class="upload-zone" ondragover="onZoneDragOver(event)" ondragleave="onZoneDragLeave(event)"
    ondrop="onZoneDrop(event)" onclick="triggerUpload()">
    <i class="ti ti-cloud-upload" aria-hidden="true"></i>
    <p>PDF 파일을 드롭하거나 클릭해서 업로드하세요</p>
    <small>여러 파일을 동시에 올리면 자동으로 병합됩니다</small>
  </div>

  <div id="workspace" class="workspace">
    <div class="ws-drop-overlay" id="ws-overlay">
      <i class="ti ti-file-plus" aria-hidden="true"></i>
      <p>PDF 파일을 놓아서 추가하세요</p>
    </div>
  </div>
  <div id="status-bar" class="status-bar">
    <i class="ti ti-hand-finger" aria-hidden="true"></i>
    <span id="status-txt">페이지를 드래그해서 순서를 변경하세요</span>
    <span id="sel-badge" class="sel-badge" style="display:none"></span>
  </div>
</div>

<!-- 암호 설정 모달 -->
<div class="modal-backdrop" id="pw-modal" onclick="onBackdropClick(event)">
  <div class="modal">
    <div class="modal-header">
      <i class="ti ti-lock" aria-hidden="true"></i>
      PDF 암호 설정
      <button class="modal-close" onclick="closePasswordModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <div class="pw-fields">
        <div class="pw-field">
          <input type="password" id="user-pw" placeholder="암호 입력"
            oninput="document.getElementById('pw-mismatch').style.display='none'">
          <button class="pw-eye" type="button" onclick="toggleEye('user-pw', this)"><i class="ti ti-eye"
              aria-hidden="true"></i></button>
        </div>
        <div class="pw-field">
          <input type="password" id="user-pw2" placeholder="암호 확인"
            oninput="document.getElementById('pw-mismatch').style.display='none'">
          <button class="pw-eye" type="button" onclick="toggleEye('user-pw2', this)"><i class="ti ti-eye"
              aria-hidden="true"></i></button>
        </div>
      </div>
      <div class="pw-mismatch" id="pw-mismatch">암호가 일치하지 않습니다.</div>
      <div class="pw-hint">PDF를 열 때 이 암호를 입력해야 합니다.</div>
    </div>
    <div class="modal-footer">
      <button class="btn danger" id="btn-pw-clear" onclick="clearPasswordSettings()"
        style="margin-right:auto;display:none">
        <i class="ti ti-lock-open" aria-hidden="true"></i> 암호 제거
      </button>
      <button class="btn" onclick="closePasswordModal()">취소</button>
      <button class="btn primary" onclick="applyPasswordSettings()"><i class="ti ti-check" aria-hidden="true"></i>
        적용</button>
    </div>
  </div>
</div>

<div class="ghost-card" id="ghost">
  <div class="ghost-thumb"><img id="ghost-img" src="" alt=""></div>
</div>
<div class="toast" id="toast"></div>
<canvas id="offscreen"></canvas>
<input type="file" id="file-input" accept=".pdf" multiple onchange="handleFiles(this.files)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  // ── PDF RC4-128 암호화 (Standard Security Handler, Revision 3) ─────────────
  const _PAD = new Uint8Array([
    0x28, 0xBF, 0x4E, 0x5E, 0x4E, 0x75, 0x8A, 0x41,
    0x64, 0x00, 0x4E, 0x56, 0xFF, 0xFA, 0x01, 0x08,
    0x2E, 0x2E, 0x00, 0xB6, 0xD0, 0x68, 0x3E, 0x80,
    0x2F, 0x0C, 0xA9, 0xFE, 0x64, 0x53, 0x69, 0x7A
  ]);
  function _md5(data) {
    const r = [7, 12, 17, 22, 7, 12, 17, 22, 7, 12, 17, 22, 7, 12, 17, 22, 5, 9, 14, 20, 5, 9, 14, 20, 5, 9, 14, 20, 5, 9, 14, 20, 4, 11, 16, 23, 4, 11, 16, 23, 4, 11, 16, 23, 4, 11, 16, 23, 6, 10, 15, 21, 6, 10, 15, 21, 6, 10, 15, 21, 6, 10, 15, 21];
    const K = new Int32Array(64);
    for (let i = 0; i < 64; i++) K[i] = (Math.abs(Math.sin(i + 1)) * 0x100000000) | 0;
    const msgLen = data.length, padLen = ((55 - msgLen) % 64 + 64) % 64 + 9;
    const padded = new Uint8Array(msgLen + padLen);
    padded.set(data); padded[msgLen] = 0x80;
    const dv = new DataView(padded.buffer);
    dv.setUint32(padded.length - 8, (msgLen * 8) >>> 0, true);
    dv.setUint32(padded.length - 4, Math.floor(msgLen / 0x20000000), true);
    let a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;
    for (let i = 0; i < padded.length; i += 64) {
      const M = new Int32Array(16);
      for (let j = 0; j < 16; j++) M[j] = dv.getInt32(i + j * 4, true);
      let A = a, B = b, C = c, D = d;
      for (let j = 0; j < 64; j++) {
        let F, g;
        if (j < 16) { F = (B & C) | (~B & D); g = j; } else if (j < 32) { F = (D & B) | (~D & C); g = (5 * j + 1) % 16; }
        else if (j < 48) { F = B ^ C ^ D; g = (3 * j + 5) % 16; } else { F = C ^ (B | ~D); g = (7 * j) % 16; }
        F = (F + A + K[j] + M[g]) | 0; A = D; D = C; C = B;
        B = (B + ((F << r[j]) | (F >>> (32 - r[j])))) | 0;
      }
      a = (a + A) | 0; b = (b + B) | 0; c = (c + C) | 0; d = (d + D) | 0;
    }
    const out = new Uint8Array(16), ov = new DataView(out.buffer);
    ov.setInt32(0, a, true); ov.setInt32(4, b, true); ov.setInt32(8, c, true); ov.setInt32(12, d, true);
    return out;
  }
  function _rc4(key, data) {
    const S = new Uint8Array(256);
    for (let i = 0; i < 256; i++) S[i] = i;
    let j = 0;
    for (let i = 0; i < 256; i++) { j = (j + S[i] + key[i % key.length]) & 255;[S[i], S[j]] = [S[j], S[i]]; }
    const out = new Uint8Array(data.length);
    let x = 0, y = 0;
    for (let i = 0; i < data.length; i++) {
      x = (x + 1) & 255; y = (y + S[x]) & 255;[S[x], S[y]] = [S[y], S[x]];
      out[i] = data[i] ^ S[(S[x] + S[y]) & 255];
    }
    return out;
  }
  function _padPw(pw) {
    const b = typeof pw === 'string' ? new TextEncoder().encode(pw) : (pw || new Uint8Array(0));
    const out = new Uint8Array(32);
    for (let i = 0; i < 32; i++) out[i] = i < b.length ? b[i] : _PAD[i - b.length];
    return out;
  }
  function _computeO(userPw, ownerPw) {
    let h = _md5(_padPw(ownerPw || userPw));
    for (let i = 0; i < 50; i++) h = _md5(h);
    const key = h.slice(0, 16);
    let v = _rc4(key, _padPw(userPw));
    for (let i = 1; i <= 19; i++) v = _rc4(key.map(b => b ^ i), v);
    return v;
  }
  function _computeKey(userPw, O, permsInt, fileId) {
    const d = new Uint8Array(68 + fileId.length);
    d.set(_padPw(userPw), 0); d.set(O, 32);
    d[64] = permsInt & 0xFF; d[65] = (permsInt >> 8) & 0xFF; d[66] = (permsInt >> 16) & 0xFF; d[67] = (permsInt >> 24) & 0xFF;
    d.set(fileId, 68);
    let h = _md5(d);
    for (let i = 0; i < 50; i++) h = _md5(h);
    return h.slice(0, 16);
  }
  function _computeU(encKey, fileId) {
    const d = new Uint8Array(32 + fileId.length);
    d.set(_PAD, 0); d.set(fileId, 32);
    let v = _rc4(encKey, _md5(d));
    for (let i = 1; i <= 19; i++) v = _rc4(encKey.map(b => b ^ i), v);
    const out = new Uint8Array(32); out.set(v); return out;
  }
  function _objKey(encKey, objNum, genNum) {
    const d = new Uint8Array(encKey.length + 5);
    d.set(encKey, 0);
    d[encKey.length] = objNum & 0xFF; d[encKey.length + 1] = (objNum >> 8) & 0xFF; d[encKey.length + 2] = (objNum >> 16) & 0xFF;
    d[encKey.length + 3] = genNum & 0xFF; d[encKey.length + 4] = (genNum >> 8) & 0xFF;
    return _md5(d).slice(0, Math.min(encKey.length + 5, 16));
  }
  function _permBits(opts) {
    let p = 0xFFFFF0C0 | 0;
    if (opts.printing) p |= 0x804;
    if (opts.modifying) p |= 0x008;
    if (opts.copying) p |= 0x010;
    if (opts.annotating) p |= 0x120;
    return (p | 0x200) | 0;
  }
  function _toHex(b) { return Array.from(b, x => x.toString(16).padStart(2, '0')).join(''); }
  function encryptPDF(pdfBytes, userPassword, ownerPassword, permissions) {
    const enc = new TextEncoder(), dec = new TextDecoder('latin1');
    const raw = dec.decode(pdfBytes), bytes = new Uint8Array(pdfBytes);
    const xrefPos = raw.lastIndexOf('\nxref');
    if (xrefPos === -1) throw new Error('PDF xref not found');
    const sxMatch = raw.match(/startxref\s+(\d+)\s+%%EOF/);
    if (!sxMatch) throw new Error('startxref not found');
    const origStartxref = parseInt(sxMatch[1]);
    const trailerMatch = raw.match(/trailer\s*<<([\s\S]*?)>>/);
    if (!trailerMatch) throw new Error('trailer not found');
    const origTrailer = trailerMatch[1];
    const rootMatch = origTrailer.match(/\/Root\s+(\d+\s+\d+\s+R)/);
    const infoMatch = origTrailer.match(/\/Info\s+(\d+\s+\d+\s+R)/);
    const sizeMatch = origTrailer.match(/\/Size\s+(\d+)/);
    if (!rootMatch || !sizeMatch) throw new Error('trailer /Root or /Size missing');
    const origSize = parseInt(sizeMatch[1]);
    const xrefStr = raw.slice(xrefPos + 1), xrefLines = xrefStr.split('\n');
    let li = 0;
    if (xrefLines[li].trim() === 'xref') li++;
    const hdr = xrefLines[li++].trim().split(/\s+/), nObjs = parseInt(hdr[1]), objs = [];
    for (let i = 0; i < nObjs; i++) {
      const parts = xrefLines[li++].trim().split(/\s+/);
      const offset = parseInt(parts[0]), type = parts[2];
      if (type === 'n' && offset > 0) objs.push({ num: i, offset });
    }
    const fileId = new Uint8Array(16); crypto.getRandomValues(fileId);
    const permsInt = _permBits(permissions || {});
    const O = _computeO(userPassword, ownerPassword);
    const encKey = _computeKey(userPassword, O, permsInt, fileId);
    const U = _computeU(encKey, fileId);
    for (const obj of objs) {
      const afterHeader = raw.indexOf('stream', obj.offset);
      if (afterHeader === -1 || afterHeader > obj.offset + 2000) continue;
      let streamStart = afterHeader + 6;
      if (raw[streamStart] === '\r') streamStart++;
      if (raw[streamStart] === '\n') streamStart++;
      const endStream = raw.indexOf('endstream', streamStart);
      if (endStream === -1 || endStream <= streamStart) continue;
      const nextObj = objs.find(o => o.offset > obj.offset);
      if (nextObj && endStream > nextObj.offset) continue;
      bytes.set(_rc4(_objKey(encKey, obj.num, 0), bytes.slice(streamStart, endStream)), streamStart);
    }
    const encObjNum = origSize;
    const encObjBytes = enc.encode(`\n${encObjNum} 0 obj\n<< /Filter /Standard /V 2 /R 3 /Length 128\n/P ${permsInt}\n/O <${_toHex(O)}>\n/U <${_toHex(U)}>\n>>\nendobj\n`);
    const encObjOffset = bytes.length;
    const newXrefBytes = enc.encode(`xref\n${encObjNum} 1\n${encObjOffset.toString().padStart(10, '0')} 00000 n \n`);
    let tp = `/Size ${encObjNum + 1}\n/Root ${rootMatch[1]}\n`;
    if (infoMatch) tp += `/Info ${infoMatch[1]}\n`;
    tp += `/Encrypt ${encObjNum} 0 R\n/ID [<${_toHex(fileId)}> <${_toHex(fileId)}>]\n/Prev ${origStartxref}\n`;
    const trailerBytes = enc.encode(`trailer\n<<\n${tp}>>\nstartxref\n${encObjOffset + encObjBytes.length + newXrefBytes.length}\n%%EOF\n`);
    const result = new Uint8Array(bytes.length + encObjBytes.length + newXrefBytes.length + trailerBytes.length);
    let pos = 0;
    result.set(bytes, pos); pos += bytes.length;
    result.set(encObjBytes, pos); pos += encObjBytes.length;
    result.set(newXrefBytes, pos); pos += newXrefBytes.length;
    result.set(trailerBytes, pos);
    return result;
  }
</script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let docs = [], selected = new Set(), dId = 1, pId = 1, drag = null, srcDocMap = {};
  let fileDragActive = false, fileDragCounter = 0;

  // 암호 설정 상태
  let pwSettings = null; // null = 미설정, 설정 시 암호 문자열

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }
  function triggerUpload() { document.getElementById('file-input').click(); }

  // ── 초기 업로드 존 ──
  function onZoneDragOver(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag-over'); }
  function onZoneDragLeave() { document.getElementById('upload-zone').classList.remove('drag-over'); }
  function onZoneDrop(e) {
    e.preventDefault();
    document.getElementById('upload-zone').classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf');
    if (files.length) handleFiles(files);
  }

  // ── 워크스페이스 드롭 ──
  function setupWorkspaceDrop() {
    const ws = document.getElementById('workspace');
    const overlay = document.getElementById('ws-overlay');

    ws.addEventListener('dragenter', e => {
      if (drag) return;
      if (![...e.dataTransfer.types].includes('Files')) return;
      e.preventDefault();
      fileDragCounter++;
      fileDragActive = true;
      overlay.classList.add('active');
    });

    ws.addEventListener('dragover', e => {
      if (drag || !fileDragActive) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });

    ws.addEventListener('dragleave', e => {
      if (drag) return;
      fileDragCounter--;
      if (fileDragCounter <= 0) {
        fileDragCounter = 0;
        fileDragActive = false;
        overlay.classList.remove('active');
      }
    });

    ws.addEventListener('drop', e => {
      if (drag) return;
      fileDragCounter = 0;
      fileDragActive = false;
      overlay.classList.remove('active');
      const files = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf');
      if (!files.length) return;
      e.preventDefault();
      e.stopPropagation();
      handleFiles(files);
    });
  }

  async function handleFiles(files) {
    for (const f of [...files]) {
      if (f.type !== 'application/pdf') continue;
      toast(`"${f.name}" 로딩 중...`);
      await loadDoc(f);
    }
    render();
  }

  async function loadDoc(file) {
    const buf = await file.arrayBuffer();
    const srcDocId = dId++;
    srcDocMap[srcDocId] = buf.slice();
    const pdf = await pdfjsLib.getDocument({ data: buf.slice() }).promise;
    const doc = { id: srcDocId, name: file.name, pdf, pages: [] };
    for (let i = 1; i <= pdf.numPages; i++) {
      const pdfPage = await pdf.getPage(i);
      doc.pages.push({ id: pId++, currentDocId: srcDocId, srcDocId, srcPageNum: i, thumb: await makeThumb(pdfPage, 0), pdfPage, rot: 0 });
    }
    docs.push(doc);
    toast(`"${file.name}" ${pdf.numPages}페이지 로드 완료`);
  }

  async function makeThumb(pdfPage, rot) {
    const c = document.getElementById('offscreen');
    const vp = pdfPage.getViewport({ scale: 0.32, rotation: rot });
    c.width = vp.width; c.height = vp.height;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, c.width, c.height);
    await pdfPage.render({ canvasContext: ctx, viewport: vp }).promise;
    return c.toDataURL('image/jpeg', 0.7);
  }

  function allPages() { return docs.flatMap(d => d.pages); }

  function render() {
    const ws = document.getElementById('workspace');
    const uz = document.getElementById('upload-zone');
    const sb = document.getElementById('status-bar');
    const has = docs.length > 0;

    uz.style.display = has ? 'none' : 'flex';
    ws.style.display = has ? 'block' : 'none';
    sb.style.display = has ? 'flex' : 'none';

    if (!has) { updateBtns(); return; }

    const overlay = document.getElementById('ws-overlay');
    ws.innerHTML = '';
    ws.appendChild(overlay);

    docs.forEach(doc => {
      const sec = document.createElement('div');
      sec.className = 'doc-section';
      const hdr = document.createElement('div');
      hdr.className = 'doc-header';
      hdr.innerHTML = `
      <i class="ti ti-file-type-pdf" aria-hidden="true" style="color:#E24B4A;font-size:15px;flex-shrink:0;"></i>
      <span class="doc-name">${esc(doc.name)}</span>
      <span class="doc-info">${doc.pages.length}페이지</span>
      <button class="btn" style="padding:3px 8px;font-size:11px;" onclick="removeDoc(${doc.id})">
        <i class="ti ti-x" aria-hidden="true"></i> 제거
      </button>
    `;
      sec.appendChild(hdr);

      const grid = document.createElement('div');
      grid.className = 'pages-grid';
      doc.pages.forEach((pg, idx) => grid.appendChild(makeSlot(pg, doc.id, idx)));
      const lastSlot = document.createElement('div');
      lastSlot.className = 'page-slot';
      const lastInd = document.createElement('div');
      lastInd.className = 'drop-indicator';
      lastInd.dataset.docId = doc.id;
      lastInd.dataset.insertIdx = doc.pages.length;
      lastSlot.appendChild(lastInd);
      grid.appendChild(lastSlot);
      sec.appendChild(grid);
      ws.appendChild(sec);
    });

    updateBtns();
  }

  function makeSlot(pg, docId, idx) {
    const slot = document.createElement('div');
    slot.className = 'page-slot';

    const ind = document.createElement('div');
    ind.className = 'drop-indicator';
    ind.dataset.docId = docId;
    ind.dataset.insertIdx = idx;
    slot.appendChild(ind);

    const card = document.createElement('div');
    card.className = 'page-card' + (selected.has(pg.id) ? ' selected' : '');

    const thumb = document.createElement('div');
    thumb.className = 'page-thumb';
    const img = document.createElement('img');
    img.className = 'page-img'; img.src = pg.thumb; img.alt = `p.${idx + 1}`; img.draggable = false;
    const chk = document.createElement('div');
    chk.className = 'page-check';
    chk.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i>';
    const delBtn = document.createElement('button');
    delBtn.className = 'page-del-btn';
    delBtn.innerHTML = '<i class="ti ti-x" aria-hidden="true"></i>';
    delBtn.addEventListener('mousedown', e => e.stopPropagation());
    delBtn.addEventListener('click', e => { e.stopPropagation(); deletePage(pg.id); });
    thumb.appendChild(img); thumb.appendChild(chk); thumb.appendChild(delBtn);

    const label = document.createElement('div');
    label.className = 'page-label';
    label.textContent = `p.${idx + 1}`;

    card.appendChild(thumb); card.appendChild(label);

    card.addEventListener('click', e => {
      if (drag && drag.moved) return;
      if (e.shiftKey || e.ctrlKey || e.metaKey) {
        selected.has(pg.id) ? selected.delete(pg.id) : selected.add(pg.id);
      } else {
        if (selected.has(pg.id) && selected.size === 1) selected.clear();
        else { selected.clear(); selected.add(pg.id); }
      }
      render();
    });

    card.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      const startX = e.clientX, startY = e.clientY;
      drag = { pageId: pg.id, docId, moved: false, card };

      const onMove = ev => {
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (!drag.moved && Math.sqrt(dx * dx + dy * dy) < 5) return;
        drag.moved = true;
        const ghost = document.getElementById('ghost');
        ghost.style.display = 'flex';
        ghost.style.left = (ev.clientX - 36) + 'px';
        ghost.style.top = (ev.clientY - 50) + 'px';
        document.getElementById('ghost-img').src = pg.thumb;
        card.classList.add('is-dragging');
        document.querySelectorAll('.drop-indicator').forEach(ind => {
          const r = ind.getBoundingClientRect();
          const dist = Math.sqrt((ev.clientX - (r.left + r.width / 2)) ** 2 + (ev.clientY - (r.top + r.height / 2)) ** 2);
          ind.classList.toggle('active', dist < 60);
        });
      };

      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.getElementById('ghost').style.display = 'none';
        card.classList.remove('is-dragging');
        if (drag && drag.moved) {
          const active = document.querySelector('.drop-indicator.active');
          if (active) doMove(pg.id, docId, parseInt(active.dataset.docId), parseInt(active.dataset.insertIdx));
          document.querySelectorAll('.drop-indicator.active').forEach(el => el.classList.remove('active'));
        }
        drag = null;
      };

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    slot.appendChild(card);
    return slot;
  }

  function doMove(pageId, fromDocId, toDocId, toIdx) {
    const fromDoc = docs.find(d => d.id === fromDocId);
    const toDoc = docs.find(d => d.id === toDocId);
    if (!fromDoc || !toDoc) return;
    const fromIdx = fromDoc.pages.findIndex(p => p.id === pageId);
    if (fromIdx === -1) return;
    const [pg] = fromDoc.pages.splice(fromIdx, 1);
    pg.currentDocId = toDocId;
    let insertAt = toIdx;
    if (fromDocId === toDocId && fromIdx < toIdx) insertAt = toIdx - 1;
    insertAt = Math.max(0, Math.min(insertAt, toDoc.pages.length));
    toDoc.pages.splice(insertAt, 0, pg);
    selected.clear(); render(); toast('페이지 이동 완료');
  }

  function deletePage(pageId) {
    for (const doc of docs) {
      const i = doc.pages.findIndex(p => p.id === pageId);
      if (i !== -1) { doc.pages.splice(i, 1); selected.delete(pageId); break; }
    }
    render(); toast('페이지 삭제됨');
  }

  function deleteSelected() {
    const n = selected.size;
    docs.forEach(d => { d.pages = d.pages.filter(p => !selected.has(p.id)); });
    selected.clear(); render(); toast(`${n}페이지 삭제됨`);
  }

  async function rotateSelected() {
    for (const doc of docs) {
      for (const pg of doc.pages) {
        if (!selected.has(pg.id)) continue;
        pg.rot = (pg.rot + 90) % 360;
        pg.thumb = await makeThumb(pg.pdfPage, pg.rot);
      }
    }
    render(); toast('회전 완료');
  }

  function selectAll() { allPages().forEach(p => selected.add(p.id)); render(); }
  function clearSel() { selected.clear(); render(); }
  function removeDoc(docId) { docs = docs.filter(d => d.id !== docId); selected.clear(); render(); }

  function updateBtns() {
    const hasPg = allPages().length > 0, hasSel = selected.size > 0;
    document.getElementById('btn-del').disabled = !hasSel;
    document.getElementById('btn-rot').disabled = !hasSel;
    document.getElementById('btn-all').disabled = !hasPg;
    document.getElementById('btn-export').disabled = !hasPg;
    const badge = document.getElementById('sel-badge');
    badge.style.display = hasSel ? 'inline' : 'none';
    if (hasSel) badge.textContent = `${selected.size}페이지 선택됨`;
    document.getElementById('status-txt').textContent = `총 ${docs.length}개 문서 · ${allPages().length}페이지`;
    // 암호 설정 버튼 상태
    const btnPw = document.getElementById('btn-pw');
    if (pwSettings) {
      btnPw.classList.add('pw-active');
      btnPw.innerHTML = '<i class="ti ti-lock" aria-hidden="true"></i> 암호 설정됨';
    } else {
      btnPw.classList.remove('pw-active');
      btnPw.innerHTML = '<i class="ti ti-lock" aria-hidden="true"></i> 암호 설정';
    }
  }

  // ── 암호 설정 모달 ──
  function openPasswordModal() {
    document.getElementById('user-pw').value = pwSettings || '';
    document.getElementById('user-pw2').value = pwSettings || '';
    document.getElementById('pw-mismatch').style.display = 'none';
    document.getElementById('btn-pw-clear').style.display = pwSettings ? 'flex' : 'none';
    document.getElementById('pw-modal').classList.add('open');
    document.getElementById('user-pw').focus();
  }

  function closePasswordModal() {
    document.getElementById('pw-modal').classList.remove('open');
  }

  function onBackdropClick(e) {
    if (e.target === document.getElementById('pw-modal')) closePasswordModal();
  }

  function toggleEye(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.querySelector('i').className = isHidden ? 'ti ti-eye-off' : 'ti ti-eye';
  }

  function applyPasswordSettings() {
    const pw = document.getElementById('user-pw').value;
    const pw2 = document.getElementById('user-pw2').value;
    if (!pw) {
      pwSettings = null;
      closePasswordModal();
      updateBtns();
      toast('암호 설정이 해제되었습니다.');
      return;
    }
    if (pw !== pw2) {
      document.getElementById('pw-mismatch').style.display = 'block';
      return;
    }
    pwSettings = pw;
    closePasswordModal();
    updateBtns();
    toast('암호 설정 완료. 내보내기 시 암호가 적용됩니다.');
  }

  function clearPasswordSettings() {
    pwSettings = null;
    closePasswordModal();
    updateBtns();
    toast('암호 설정이 제거되었습니다.');
  }

  async function exportPDF() {
    const pages = allPages();
    if (!pages.length) return;
    toast('PDF 생성 중...');
    try {
      const { PDFDocument, degrees } = PDFLib;
      const out = await PDFDocument.create();
      const loadedSrcDocs = {};
      for (const pg of pages) {
        if (!loadedSrcDocs[pg.srcDocId]) loadedSrcDocs[pg.srcDocId] = await PDFDocument.load(srcDocMap[pg.srcDocId]);
      }
      for (const pg of pages) {
        const [copied] = await out.copyPages(loadedSrcDocs[pg.srcDocId], [pg.srcPageNum - 1]);
        if (pg.rot) copied.setRotation(degrees(pg.rot));
        out.addPage(copied);
      }

      // useObjectStreams: false 필수 — pdf_encrypt.js의 스트림 파서가 평문 xref를 필요로 함
      let bytes = await out.save({ useObjectStreams: false });

      if (pwSettings) {
        bytes = encryptPDF(bytes, pwSettings, pwSettings, {
          printing: true, modifying: true, copying: true, annotating: true
        });
      }

      const url = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
      Object.assign(document.createElement('a'), { href: url, download: 'merged.pdf' }).click();
      URL.revokeObjectURL(url);
      toast(`내보내기 완료 (${pages.length}페이지)${pwSettings ? ' · 암호 적용됨' : ''}`);
    } catch (err) { toast('오류: ' + err.message); console.error(err); }
  }

  function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  setupWorkspaceDrop();
</script>
